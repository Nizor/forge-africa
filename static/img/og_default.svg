<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0F172A"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.05"/>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#F97316" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Orange accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#F97316"/>
  <!-- Logo area -->
  <rect x="80" y="200" width="60" height="60" rx="12" fill="#F97316"/>
  <text x="110" y="243" font-family="Arial" font-size="28" font-weight="900" fill="white" text-anchor="middle">F</text>
  <!-- Main text -->
  <text x="160" y="243" font-family="Arial" font-size="42" font-weight="900" fill="white">FORGE</text>
  <text x="340" y="243" font-family="Arial" font-size="42" font-weight="400" fill="#F97316">AFRICA</text>
  <!-- Tagline -->
  <text x="80" y="310" font-family="Arial" font-size="28" fill="#94A3B8">Nigeria&#x27;s Manufacturing RFQ Platform</text>
  <!-- Subtext -->
  <text x="80" y="380" font-family="Arial" font-size="20" fill="#64748B">Source. Bid. Manufacture.</text>
  <!-- URL -->
  <text x="80" y="560" font-family="Arial" font-size="18" fill="#475569">forgeafrica.africa</text>
</svg>